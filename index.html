<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ikke Min Dag i Dag - Bryllupssang</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Georgia", "Times New Roman", serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #fdf6e3, #fceef0, #f0e6f6);
            color: #3a3a3a;
        }
        .player {
            text-align: center;
            padding: 3rem 2.5rem;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(180, 140, 160, 0.25);
            max-width: 420px;
            width: 90%;
        }
        .ornament {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            opacity: 0.7;
        }
        h1 {
            font-size: 1.6rem;
            font-style: italic;
            font-weight: normal;
            margin-bottom: 0.3rem;
            color: #6b4c5a;
        }
        .dedication {
            font-size: 1rem;
            color: #8c6a7a;
            margin-bottom: 0.2rem;
        }
        .date {
            font-size: 0.85rem;
            color: #b08a9a;
            margin-bottom: 1.5rem;
        }
        audio {
            width: 100%;
            min-width: 280px;
            margin-bottom: 1.5rem;
        }
        .artist {
            font-size: 0.95rem;
            color: #7a5c6a;
        }
        .artist span {
            font-weight: bold;
        }
        .divider {
            width: 60px;
            height: 1px;
            background: #d4b0c0;
            margin: 1rem auto;
        }
        .spotify-link {
            display: inline-block;
            margin-top: 1.2rem;
            padding: 0.5rem 1.2rem;
            background: #1db954;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.2s;
        }
        .spotify-link:hover {
            background: #1aa34a;
        }
    </style>
</head>
<body>
    <div class="player">
        <div class="ornament">&hearts;</div>
        <p class="dedication">Til Kristin &amp; Fredrik</p>
        <h1>&laquo;Ikke Min Dag i Dag&raquo;</h1>
        <p class="date">11. april 2026</p>
        <audio controls preload="metadata">
            <source src="Ikke Min Dag i Dag.mp3" type="audio/mpeg">
            Nettleseren din st&oslash;tter ikke lydavspilling.
        </audio>
        <div class="divider"></div>
        <p class="artist">Fremf&oslash;rt av <span>Karoline Stensvik</span></p>
        <a class="spotify-link" href="https://open.spotify.com/playlist/7la6ngzoc8Hn6SGHD4IZwp" target="_blank" rel="noopener">&#9835; Bryllupsspilleliste p&aring; Spotify</a>
    </div>
</body>
</html>
